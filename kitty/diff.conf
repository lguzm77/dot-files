# Diff kitten configuration for Ayu Dark theme
color_scheme dark

# Base colors
dark_background #0e1419
dark_foreground #e5e1cf

# Title (header)
dark_title_bg #243340
dark_title_fg #e5e1cf

# Margin (line numbers)
dark_margin_bg #0b1014
dark_margin_fg #323232

# Added lines (green palette)
dark_added_bg #132613
dark_highlight_added_bg #1a3a1a
dark_added_margin_bg #0b1014

# Removed lines (red palette)
dark_removed_bg #2a1313
dark_highlight_removed_bg #3a1a1a
dark_removed_margin_bg #0b1014

# Filler lines
dark_filler_bg #0e1419
dark_margin_filler_bg #0b1014

# Hunk headers (yellow palette)
dark_hunk_bg #2a2613
dark_hunk_margin_bg #3a3213

# Search & selection
dark_search_bg #243340
dark_search_fg #e5e1cf
dark_select_bg #f19618
dark_select_fg #0e1419
