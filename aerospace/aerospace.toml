# AeroSpace Configuration
# https://github.com/nikitabobko/AeroSpace

# Start AeroSpace at login
start-at-login = true

# Gaps between windows and screen edges
[gaps]
inner.horizontal = 8
inner.vertical   = 8
outer.left       = 8
outer.right      = 8
outer.top        = 8
outer.bottom     = 8


# Default layout for new workspaces
[mode.main.binding]

# Focus windows with Alt + hjkl (Vim-style)
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move windows with Alt + Shift + hjkl
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize windows
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# Switch layouts
alt-slash      = 'layout tiles horizontal vertical'
alt-comma      = 'layout accordion horizontal vertical'

# Toggle fullscreen
alt-f = 'fullscreen'

# Switch workspaces with Alt + 1-9
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'

# Move window to workspace with Alt + Shift + 1-9
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'

# Reload config
alt-shift-semicolon = 'reload-config'


[mode.service.binding]
esc            = 'mode main'
r              = ['flatten-workspace-tree', 'mode main']
alt-shift-h    = ['join-with left',  'mode main']
alt-shift-j    = ['join-with down',  'mode main']
alt-shift-k    = ['join-with up',    'mode main']
alt-shift-l    = ['join-with right', 'mode main']
